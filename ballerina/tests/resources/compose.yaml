services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-store
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Test-1234#
      POSTGRES_DB: message_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d message_db"]
      interval: 5s
      timeout: 5s
      retries: 10
